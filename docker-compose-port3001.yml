# New-API Docker Compose Configuration - Port 3001
#
# 用于在本机额外起一套 3001 入口，避免占用默认 3000 端口。
# 该配置默认复用主 compose 的 PostgreSQL 卷 `new-api_pg_data`，
# 但 runtime 配置仍应通过环境变量显式传入，避免丢失稳定 secret。
#
# 启动命令: docker compose -f docker-compose-port3001.yml up -d
# 访问地址: http://localhost:3001

services:
  new-api:
    image: ${NEW_API_IMAGE:-new-api-local:prod-20260412-080601}
    container_name: new-api-port3001
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3001:3000"  # 修改: 外部端口改为 3001
    volumes:
      - ./data:/data           # 共享数据目录
      - ./logs:/app/logs       # 共享日志目录
    environment:
      - SESSION_SECRET=${SESSION_SECRET}
      - CRYPTO_SECRET=${CRYPTO_SECRET}
      - SQL_DSN=${SQL_DSN:-postgresql://root:123456@postgres-port3001:5432/new-api}
      - REDIS_CONN_STRING=${REDIS_CONN_STRING:-redis://redis-port3001}
      - TZ=${TZ:-Asia/Shanghai}
      - ERROR_LOG_ENABLED=${ERROR_LOG_ENABLED:-true}
      - BATCH_UPDATE_ENABLED=${BATCH_UPDATE_ENABLED:-true}
    depends_on:
      - redis-port3001
      - postgres-port3001
    networks:
      - new-api-network-port3001
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis-port3001:
    image: redis:latest
    container_name: redis-port3001
    restart: always
    networks:
      - new-api-network-port3001

  postgres-port3001:
    image: postgres:15
    container_name: postgres-port3001
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data  # 共享原数据卷
    networks:
      - new-api-network-port3001

volumes:
  pg_data:
    external: true
    name: new-api_pg_data

networks:
  new-api-network-port3001:
    driver: bridge
