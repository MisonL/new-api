# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "zh-CN"
tone_instructions: "使用中文，直接、严格、基于证据，优先指出真实风险、回归风险和测试缺口，不写空话。"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  review_status: true
  review_details: false
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "^main$"
    ignore_usernames:
      - "github-actions[bot]"
      - "dependabot[bot]"
      - "renovate[bot]"

chat:
  auto_reply: true
