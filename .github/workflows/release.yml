name: Release (Linux, macOS, Windows)
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  BUILD_SOURCE: https://github.com/${{ github.repository }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Stable tag name to release (e.g. v1.0.1)'
        required: true
        type: string
      reason:
        description: 'reason'
        required: false

jobs:
  linux:
    name: Linux Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.event.inputs.tag }}
      - name: Determine Version
        run: |
          TAG_NAME="${{ github.event.inputs.tag }}"
          if ! git rev-parse "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag '$TAG_NAME' does not exist"
            exit 1
          fi

          VERSION=$(cat VERSION)
          if [[ "$TAG_NAME" != "$VERSION" ]]; then
            echo "Tag '$TAG_NAME' does not match VERSION '$VERSION'"
            exit 1
          fi
          if [[ ! "$TAG_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG_NAME' is not a stable semver tag (expected: vMAJOR.MINOR.PATCH)"
            exit 1
          fi
          VERSION_NO_V="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_NO_V=$VERSION_NO_V" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Build Frontend
        env:
          CI: ""
        run: |
          cd web
          bun install
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION="$VERSION" bun run build
          cd ..
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'
      - name: Build Backend (amd64)
        run: |
          go mod download
          OUTPUT_FILE="new-api_${VERSION_NO_V}_linux_amd64"
          go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION' -X 'github.com/QuantumNous/new-api/common.BuildCommit=$(git rev-parse HEAD)' -X 'github.com/QuantumNous/new-api/common.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)' -X 'github.com/QuantumNous/new-api/common.BuildSource=$BUILD_SOURCE' -extldflags '-static'" -o "$OUTPUT_FILE"
          echo "OUTPUT_LINUX_AMD64=$OUTPUT_FILE" >> "$GITHUB_ENV"
      - name: Build Backend (arm64)
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y gcc-aarch64-linux-gnu
          OUTPUT_FILE="new-api_${VERSION_NO_V}_linux_arm64"
          CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION' -X 'github.com/QuantumNous/new-api/common.BuildCommit=$(git rev-parse HEAD)' -X 'github.com/QuantumNous/new-api/common.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)' -X 'github.com/QuantumNous/new-api/common.BuildSource=$BUILD_SOURCE' -extldflags '-static'" -o "$OUTPUT_FILE"
          echo "OUTPUT_LINUX_ARM64=$OUTPUT_FILE" >> "$GITHUB_ENV"
      - name: Generate checksums
        run: |
          CHECKSUM_FILE="new-api_${VERSION_NO_V}_checksums_linux.txt"
          sha256sum "$OUTPUT_LINUX_AMD64" "$OUTPUT_LINUX_ARM64" > "$CHECKSUM_FILE"
          echo "CHECKSUM_FILE=$CHECKSUM_FILE" >> "$GITHUB_ENV"

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ${{ env.OUTPUT_LINUX_AMD64 }}
            ${{ env.OUTPUT_LINUX_ARM64 }}
            ${{ env.CHECKSUM_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    name: macOS Release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.event.inputs.tag }}
      - name: Determine Version
        run: |
          TAG_NAME="${{ github.event.inputs.tag }}"
          if ! git rev-parse "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag '$TAG_NAME' does not exist"
            exit 1
          fi

          VERSION=$(cat VERSION)
          if [[ "$TAG_NAME" != "$VERSION" ]]; then
            echo "Tag '$TAG_NAME' does not match VERSION '$VERSION'"
            exit 1
          fi
          if [[ ! "$TAG_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG_NAME' is not a stable semver tag (expected: vMAJOR.MINOR.PATCH)"
            exit 1
          fi
          VERSION_NO_V="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_NO_V=$VERSION_NO_V" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Build Frontend
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd web
          bun install
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION="$VERSION" bun run build
          cd ..
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'
      - name: Build Backend
        run: |
          go mod download
          HOST_ARCH="$(uname -m)"
          case "$HOST_ARCH" in
            x86_64) TARGET_ARCH="amd64" ;;
            arm64|aarch64) TARGET_ARCH="arm64" ;;
            *)
              echo "Unsupported macOS host arch: $HOST_ARCH"
              exit 1
              ;;
          esac
          OUTPUT_FILE="new-api_${VERSION_NO_V}_macos_${TARGET_ARCH}"
          GOOS=darwin GOARCH="$TARGET_ARCH" go build -ldflags "-X 'github.com/QuantumNous/new-api/common.Version=$VERSION' -X 'github.com/QuantumNous/new-api/common.BuildCommit=$(git rev-parse HEAD)' -X 'github.com/QuantumNous/new-api/common.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)' -X 'github.com/QuantumNous/new-api/common.BuildSource=$BUILD_SOURCE'" -o "$OUTPUT_FILE"
          echo "OUTPUT_MACOS=$OUTPUT_FILE" >> "$GITHUB_ENV"
      - name: Generate checksums
        run: |
          CHECKSUM_FILE="new-api_${VERSION_NO_V}_checksums_macos.txt"
          shasum -a 256 "$OUTPUT_MACOS" > "$CHECKSUM_FILE"
          echo "CHECKSUM_FILE=$CHECKSUM_FILE" >> "$GITHUB_ENV"

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ${{ env.OUTPUT_MACOS }}
            ${{ env.CHECKSUM_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: Windows Release
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.event.inputs.tag }}
      - name: Determine Version
        run: |
          TAG_NAME="${{ github.event.inputs.tag }}"
          if ! git rev-parse "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag '$TAG_NAME' does not exist"
            exit 1
          fi

          VERSION=$(cat VERSION)
          if [[ "$TAG_NAME" != "$VERSION" ]]; then
            echo "Tag '$TAG_NAME' does not match VERSION '$VERSION'"
            exit 1
          fi
          if [[ ! "$TAG_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG_NAME' is not a stable semver tag (expected: vMAJOR.MINOR.PATCH)"
            exit 1
          fi
          VERSION_NO_V="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_NO_V=$VERSION_NO_V" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Build Frontend
        env:
          CI: ""
        run: |
          cd web
          bun install
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION="$VERSION" bun run build
          cd ..
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'
      - name: Build Backend
        run: |
          go mod download
          OUTPUT_FILE="new-api_${VERSION_NO_V}_windows_amd64.exe"
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION' -X 'github.com/QuantumNous/new-api/common.BuildCommit=$(git rev-parse HEAD)' -X 'github.com/QuantumNous/new-api/common.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)' -X 'github.com/QuantumNous/new-api/common.BuildSource=$BUILD_SOURCE'" -o "$OUTPUT_FILE"
          echo "OUTPUT_WINDOWS=$OUTPUT_FILE" >> "$GITHUB_ENV"
      - name: Generate checksums
        run: |
          CHECKSUM_FILE="new-api_${VERSION_NO_V}_checksums_windows.txt"
          sha256sum "$OUTPUT_WINDOWS" > "$CHECKSUM_FILE"
          echo "CHECKSUM_FILE=$CHECKSUM_FILE" >> "$GITHUB_ENV"

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ${{ env.OUTPUT_WINDOWS }}
            ${{ env.CHECKSUM_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
