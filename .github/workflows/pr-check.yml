name: PR Check

permissions:
  contents: read
  issues: read
  pull-requests: read

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  pr-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: peakoss/anti-slop@v0.2.1
        with:
          max-failures: 4
          require-description: false

          # require-linked-issue: false
          require-pr-template: false

          detect-spam-usernames: true
          min-account-age: 30

          failure-add-pr-labels: "pr-check-failed"
          failure-pr-message: "该 PR 未通过基础门禁检查。项目接受 AI 协助开发，但提交人必须核对结果并对后续修复负责。/ This PR did not pass the baseline checks. AI-assisted development is allowed, but the submitter must verify the result and remain responsible for follow-up fixes."
          close-pr: true
