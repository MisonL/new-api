name: Release Tauri Desktop

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--max_old_space_size=6144'

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Stable tag name to release (e.g. v1.0.1)'
        required: true
        type: string

jobs:
  build:
    name: Build Tauri bundle (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
          - os: macos-15
            platform: macos
          - os: ubuntu-22.04
            platform: linux
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag and validate VERSION
        run: |
          TAG_NAME="${{ github.event.inputs.tag }}"
          git fetch --tags --force
          if ! git rev-parse "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag '${TAG_NAME}' does not exist"
            exit 1
          fi
          git checkout "refs/tags/${TAG_NAME}"

          VERSION="$(cat VERSION)"
          if [[ "${TAG_NAME}" != "${VERSION}" ]]; then
            echo "Tag '${TAG_NAME}' does not match VERSION '${VERSION}'"
            exit 1
          fi
          if [[ ! "${TAG_NAME}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${TAG_NAME}' is not a stable semver tag (expected: vMAJOR.MINOR.PATCH)"
            exit 1
          fi

          VERSION_NO_V="${VERSION#v}"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "VERSION_NO_V=${VERSION_NO_V}" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            unzip \
            wget

      - name: Prepare desktop web and sidecar
        run: |
          cd desktop/tauri-app
          bun install --frozen-lockfile
          bun run prepare:version
          bun run check:version
          bun run prepare:web
          bun run prepare:sidecar

      - name: Run desktop Rust integration test
        run: |
          cd desktop/tauri-app
          bun run test:rust

      - name: Build Tauri desktop bundle
        uses: tauri-apps/tauri-action@v0.6.2
        with:
          projectPath: desktop/tauri-app
          tauriScript: bun run

      - name: Upload Tauri bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            desktop/tauri-app/src-tauri/target/release/bundle/**/*

  release:
    name: Upload Tauri artifacts to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        run: |
          TAG_NAME="${{ github.event.inputs.tag }}"
          VERSION_NO_V="${TAG_NAME#v}"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "VERSION_NO_V=$VERSION_NO_V" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Normalize desktop artifact names
        run: |
          set -euo pipefail

          pick_one() {
            local pattern="$1"
            local label="$2"
            mapfile -t files < <(find tauri-bundle-* -type f -name "$pattern" | sort)
            if [[ ${#files[@]} -eq 0 ]]; then
              echo "Missing desktop artifact for pattern: $pattern"
              exit 1
            fi
            if [[ ${#files[@]} -gt 1 ]]; then
              echo "Found multiple files for $label ($pattern):"
              printf '  %s\n' "${files[@]}"
              exit 1
            fi
            echo "${files[0]}"
          }

          detect_arch() {
            local file_name
            file_name="$(basename "$1")"
            case "$file_name" in
              *aarch64*|*arm64*) echo "arm64" ;;
              *x86_64*|*x64*|*amd64*) echo "amd64" ;;
              *)
                echo "Cannot detect arch from artifact name: $file_name"
                exit 1
                ;;
            esac
          }

          VERSION="$VERSION_NO_V"
          mkdir -p release-assets

          DMG_FILE="$(pick_one '*.dmg' 'macOS dmg')"
          APP_TAR_FILE="$(pick_one '*.app.tar.gz' 'macOS app tar')"
          APPIMAGE_FILE="$(pick_one '*.AppImage' 'Linux AppImage')"
          DEB_FILE="$(pick_one '*.deb' 'Linux deb')"
          RPM_FILE="$(pick_one '*.rpm' 'Linux rpm')"
          SETUP_EXE_FILE="$(pick_one '*-setup.exe' 'Windows setup exe')"
          MSI_FILE="$(pick_one '*.msi' 'Windows msi')"

          MACOS_ARCH="$(detect_arch "$DMG_FILE")"
          LINUX_ARCH="$(detect_arch "$APPIMAGE_FILE")"
          WINDOWS_ARCH="$(detect_arch "$SETUP_EXE_FILE")"

          cp "$DMG_FILE" "release-assets/new-api-desktop_${VERSION}_macos_${MACOS_ARCH}.dmg"
          cp "$APP_TAR_FILE" "release-assets/new-api-desktop_${VERSION}_macos_${MACOS_ARCH}.app.tar.gz"
          cp "$APPIMAGE_FILE" "release-assets/new-api-desktop_${VERSION}_linux_${LINUX_ARCH}.AppImage"
          cp "$DEB_FILE" "release-assets/new-api-desktop_${VERSION}_linux_${LINUX_ARCH}.deb"
          cp "$RPM_FILE" "release-assets/new-api-desktop_${VERSION}_linux_${LINUX_ARCH}.rpm"
          cp "$SETUP_EXE_FILE" "release-assets/new-api-desktop_${VERSION}_windows_${WINDOWS_ARCH}-setup.exe"
          cp "$MSI_FILE" "release-assets/new-api-desktop_${VERSION}_windows_${WINDOWS_ARCH}.msi"

          (
            cd release-assets
            sha256sum * > "new-api-desktop_${VERSION}_checksums.txt"
          )

          ls -lh release-assets

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
