name: Build Tauri Desktop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
          - os: macos-13
            platform: macos
          - os: ubuntu-22.04
            platform: linux
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run web node contract tests
        run: |
          cd web
          bun run test:node

      - name: Check desktop version sync
        run: |
          cd desktop/tauri-app
          bun run check:version

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            unzip \
            wget

      - name: Run desktop Rust integration test
        run: |
          cd desktop/tauri-app
          bun run test:rust

      - name: Build Tauri desktop bundle
        uses: tauri-apps/tauri-action@v1
        with:
          projectPath: desktop/tauri-app
          tauriScript: bun run
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: desktop-${{ matrix.platform }}-[arch]-[bundle]
