name: Build Tauri Desktop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--max_old_space_size=6144'

on:
  pull_request:
    paths:
      - ".github/workflows/tauri-build.yml"
      - "desktop/tauri-app/**"
      - "web/**"
      - "go.mod"
      - "go.sum"
      - "VERSION"
  push:
    branches:
      - main
      - feat/desktop-tauri2-migration
    paths:
      - ".github/workflows/tauri-build.yml"
      - "desktop/tauri-app/**"
      - "web/**"
      - "go.mod"
      - "go.sum"
      - "VERSION"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
          - os: macos-15
            platform: macos
          - os: ubuntu-22.04
            platform: linux
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run web node contract tests
        run: |
          cd web
          bun run test:node

      - name: Check desktop version sync
        run: |
          cd desktop/tauri-app
          bun run check:version

      - name: Prepare desktop web assets
        run: |
          cd desktop/tauri-app
          bun run prepare:web

      - name: Prepare desktop sidecar
        run: |
          cd desktop/tauri-app
          bun run prepare:sidecar

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            unzip \
            wget

      - name: Run desktop Rust integration test
        run: |
          cd desktop/tauri-app
          bun run test:rust

      - name: Build Tauri desktop bundle
        uses: tauri-apps/tauri-action@v0.6.2
        with:
          projectPath: desktop/tauri-app
          tauriScript: bun run
