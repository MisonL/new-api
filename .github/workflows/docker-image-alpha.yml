name: Publish Docker image (alpha, GHCR + optional Docker Hub)

on:
  push:
    branches:
      - alpha
  workflow_dispatch:
    inputs:
      name:
        description: "reason"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Determine alpha version
        id: version
        run: |
          VERSION="alpha-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "$VERSION" > VERSION
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version: $VERSION for ${{ matrix.arch }}"

      - name: Prepare registry targets
        id: registry
        run: |
          echo "ghcr_repository=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "dockerhub_enabled=true" >> "$GITHUB_OUTPUT"
            echo "dockerhub_repository=${{ secrets.DOCKERHUB_USERNAME }}/new-api" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.registry.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ${{ steps.registry.outputs.ghcr_repository }}

      - name: Prepare image tags
        id: tags
        run: |
          {
            echo "value<<EOF"
            echo "${{ steps.registry.outputs.ghcr_repository }}:alpha-${{ matrix.arch }}"
            echo "${{ steps.registry.outputs.ghcr_repository }}:${{ steps.version.outputs.value }}-${{ matrix.arch }}"
            if [ "${{ steps.registry.outputs.dockerhub_enabled }}" = "true" ]; then
              echo "${{ steps.registry.outputs.dockerhub_repository }}:alpha-${{ matrix.arch }}"
              echo "${{ steps.registry.outputs.dockerhub_repository }}:${{ steps.version.outputs.value }}-${{ matrix.arch }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push single-arch
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.value }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image with cosign
        run: |
          cosign sign --yes "${{ steps.registry.outputs.ghcr_repository }}@${{ steps.build.outputs.digest }}"
          if [ "${{ steps.registry.outputs.dockerhub_enabled }}" = "true" ]; then
            cosign sign --yes "${{ steps.registry.outputs.dockerhub_repository }}@${{ steps.build.outputs.digest }}"
          fi

      - name: Output digest
        run: |
          {
            echo "### Docker Image Digest (${{ matrix.arch }})"
            echo '```'
            echo "${{ steps.registry.outputs.ghcr_repository }}:alpha-${{ matrix.arch }}"
            if [ "${{ steps.registry.outputs.dockerhub_enabled }}" = "true" ]; then
              echo "${{ steps.registry.outputs.dockerhub_repository }}:alpha-${{ matrix.arch }}"
            fi
            echo "${{ steps.build.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  create_manifests:
    name: Create multi-arch manifests (GHCR + optional Docker Hub)
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Prepare registry targets
        id: registry
        run: |
          echo "ghcr_repository=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "dockerhub_enabled=true" >> "$GITHUB_OUTPUT"
            echo "dockerhub_repository=${{ secrets.DOCKERHUB_USERNAME }}/new-api" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine alpha version
        id: version
        run: |
          VERSION="alpha-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (GHCR - alpha)
        run: |
          docker buildx imagetools create \
            -t "${{ steps.registry.outputs.ghcr_repository }}:alpha" \
            "${{ steps.registry.outputs.ghcr_repository }}:alpha-amd64" \
            "${{ steps.registry.outputs.ghcr_repository }}:alpha-arm64"

      - name: Create & push manifest (GHCR - versioned alpha)
        run: |
          docker buildx imagetools create \
            -t "${{ steps.registry.outputs.ghcr_repository }}:${VERSION}" \
            "${{ steps.registry.outputs.ghcr_repository }}:${VERSION}-amd64" \
            "${{ steps.registry.outputs.ghcr_repository }}:${VERSION}-arm64"

      - name: Log in to Docker Hub
        if: steps.registry.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push manifest (Docker Hub - alpha)
        if: steps.registry.outputs.dockerhub_enabled == 'true'
        run: |
          docker buildx imagetools create \
            -t "${{ steps.registry.outputs.dockerhub_repository }}:alpha" \
            "${{ steps.registry.outputs.dockerhub_repository }}:alpha-amd64" \
            "${{ steps.registry.outputs.dockerhub_repository }}:alpha-arm64"

      - name: Create & push manifest (Docker Hub - versioned alpha)
        if: steps.registry.outputs.dockerhub_enabled == 'true'
        run: |
          docker buildx imagetools create \
            -t "${{ steps.registry.outputs.dockerhub_repository }}:${VERSION}" \
            "${{ steps.registry.outputs.dockerhub_repository }}:${VERSION}-amd64" \
            "${{ steps.registry.outputs.dockerhub_repository }}:${VERSION}-arm64"

      - name: Output manifest digest
        run: |
          {
            echo "### Multi-arch Manifest Digests"
            echo '```'
            docker buildx imagetools inspect "${{ steps.registry.outputs.ghcr_repository }}:alpha"
            if [ "${{ steps.registry.outputs.dockerhub_enabled }}" = "true" ]; then
              echo "---"
              docker buildx imagetools inspect "${{ steps.registry.outputs.dockerhub_repository }}:alpha"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
